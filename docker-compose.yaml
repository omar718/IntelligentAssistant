services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: intelligent_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Paris
      PGTZ: Europe/Paris
    command: ["postgres", "-c", "timezone=Europe/Paris"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - C:/tmp/intelligent-assistant:/tmp/intelligent-assistant
      - C:/Users:/hostusers
    environment:
      HOST_CLONE_BASE_DIR: C:/tmp/intelligent-assistant
      HOST_USERS_DIR: C:/Users
      CONTAINER_USERS_DIR: /hostusers

  celery:
    build: ./backend
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - C:/tmp/intelligent-assistant:/tmp/intelligent-assistant
      - C:/Users:/hostusers
    environment:
      HOST_CLONE_BASE_DIR: C:/tmp/intelligent-assistant
      HOST_USERS_DIR: C:/Users
      CONTAINER_USERS_DIR: /hostusers

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  